apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-api-in-mem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-api-in-mem
  template:
    metadata:
      labels:
        app: node-api-in-mem
    spec:
      containers:
        - name: node-api-in-mem
          image: shivansh760/node-api:0b7aae29ed4bcddc3c29cdf95aad34a4e43a0cab
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: node-api-config
