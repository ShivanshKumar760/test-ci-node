name: Node API - Build & Update Manifest (GitOps)

on:
  push:
    branches: [master]

env:
  IMAGE_NAME: ${{secrets.DOCKERHUB_USERNAME}}/node-api

jobs:
  build-push-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      # PHASE 1: Build the image locally (Do not push yet)
      - name: Build Local Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # CRITICAL: This loads the image into the local runner daemon
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # PHASE 2: Scan the local image
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "table"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1" # CRITICAL: Stops the pipeline if vulnerability checks fail

      # PHASE 3: Push the image only if the scan step above succeeded
      - name: Push Image to Docker Hub
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # PHASE 4: Update Manifest
      - name: Update k8s Manifest
        run: |
          sed -i "s|image: ${{ env.IMAGE_NAME }}:.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            k8s/deployment.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yml
          git commit -m "ci: bump node-api to ${{ github.sha }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
